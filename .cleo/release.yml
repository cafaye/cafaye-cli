project:
  name: cafaye-cli
  repository: cafaye/cafaye-cli

release:
  artifacts:
    - dist/cafaye-linux-amd64
    - dist/cafaye-darwin-arm64
    - dist/cafaye-darwin-amd64
    - dist/SHA256SUMS
  notes:
    from_changelog: false
    template: |
      Cafaye CLI release {{ .Tag }}

      Highlights:
      - Bundled, version-matched Cafaye agent skill shipped in the CLI binary
      - Managed skill install path maintained at ~/.agents/skills/cafaye/SKILL.md
      - New command: cafaye skills install --root <workspace-or-bundle-root>
