name: Homebrew Formula Update

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Update formula for release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: ./scripts/update-homebrew-formula.sh "$TAG"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(homebrew): update formula for ${{ github.event.release.tag_name }}"
          branch: "codex/homebrew-formula-${{ github.event.release.tag_name }}"
          title: "chore(homebrew): update formula for ${{ github.event.release.tag_name }}"
          body: |
            Automated formula update for release `${{ github.event.release.tag_name }}`.

            - bumps `Formula/cafaye.rb` source tag
            - refreshes tarball SHA256
          labels: release,homebrew
