name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Install Cleo
        run: npm install -g @getcleo/cli

      - name: Build release artifacts
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cafaye-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/cafaye-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/cafaye-darwin-amd64 .

      - name: Release with Cleo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cleo release --config .cleo/release.yml
