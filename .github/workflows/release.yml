name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Ensure Cleo
        run: ./scripts/ensure-cleo.sh

      - name: Build release artifacts (validation)
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cafaye-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/cafaye-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/cafaye-darwin-amd64 .
          (cd dist && sha256sum cafaye-* > SHA256SUMS)

      - name: Cleo release plan
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; skipping cleo release plan"
          else
            cleo release plan --version "${GITHUB_REF_NAME}"
          fi

      - name: First-tag smoke gate
        run: |
          set -euo pipefail
          PRIOR_TAGS=$(git tag --list 'v*' | grep -vx "${GITHUB_REF_NAME}" | wc -l | tr -d ' ')
          echo "prior_tags=${PRIOR_TAGS}"
          if [[ "${PRIOR_TAGS}" == "0" ]]; then
            echo "Running first-tag release smoke checks"
            cleo release list --limit 1 || true
            if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
              echo "Release ${GITHUB_REF_NAME} already exists; skipping first-tag cleo release plan"
            else
              cleo release plan --version "${GITHUB_REF_NAME}"
            fi
          else
            echo "Not first tag; skipping first-tag smoke gate"
          fi

      - name: Release with Cleo
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; skipping cleo publish"
          else
            cleo release publish --version "${GITHUB_REF_NAME}" --final \
              --summary "Cafaye CLI release ${GITHUB_REF_NAME}" \
              --highlights "Agent-first non-interactive CLI workflows"
          fi

      - name: Normalize release assets
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            dist/cafaye-linux-amd64 \
            dist/cafaye-darwin-arm64 \
            dist/cafaye-darwin-amd64 \
            dist/SHA256SUMS \
            --clobber
          for asset in $(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | grep '^cleo_' || true); do
            gh release delete-asset "${GITHUB_REF_NAME}" "$asset" -y
          done

      - name: Verify release assets
        run: |
          set -euo pipefail
          assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"
          echo "${assets}"
          echo "${assets}" | grep -qx "cafaye-linux-amd64"
          echo "${assets}" | grep -qx "cafaye-darwin-arm64"
          echo "${assets}" | grep -qx "cafaye-darwin-amd64"
          echo "${assets}" | grep -qx "SHA256SUMS"

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi
          TAP_REPO="cafaye/homebrew-cafaye-cli"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap
          FORMULA_PATH=Formula/cafaye.rb ../scripts/update-homebrew-formula.sh "${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cafaye.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          git commit -m "chore(formula): bump cafaye to ${TAG}"
          git push origin master
