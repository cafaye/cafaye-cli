name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Ensure Cleo
        run: ./scripts/ensure-cleo.sh

      - name: Build release artifacts (validation)
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cafaye-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/cafaye-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/cafaye-darwin-amd64 .
          (cd dist && sha256sum cafaye-* > SHA256SUMS)

      - name: Cleo release plan
        run: cleo release plan --version "${GITHUB_REF_NAME}"

      - name: First-tag smoke gate
        run: |
          PRIOR_TAGS=$(git tag --list 'v*' | grep -vx "${GITHUB_REF_NAME}" | wc -l | tr -d ' ')
          echo "prior_tags=${PRIOR_TAGS}"
          if [[ "${PRIOR_TAGS}" == "0" ]]; then
            echo "Running first-tag release smoke checks"
            cleo release list --limit 1 || true
            cleo release plan --version "${GITHUB_REF_NAME}"
          else
            echo "Not first tag; skipping first-tag smoke gate"
          fi

      - name: Release with Cleo
        run: |
          cleo release publish --version "${GITHUB_REF_NAME}" --final \
            --summary "Cafaye CLI release ${GITHUB_REF_NAME}" \
            --highlights "Agent-first non-interactive CLI workflows"

      - name: Normalize release assets
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            dist/cafaye-linux-amd64 \
            dist/cafaye-darwin-arm64 \
            dist/cafaye-darwin-amd64 \
            dist/SHA256SUMS \
            --clobber
          for asset in $(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | grep '^cleo_' || true); do
            gh release delete-asset "${GITHUB_REF_NAME}" "$asset" -y
          done

      - name: Verify release with Cleo
        run: cleo release verify --version "${GITHUB_REF_NAME}"
