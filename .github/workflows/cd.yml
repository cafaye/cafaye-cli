name: CD

on:
  push:
    branches: [master]

jobs:
  install-uninstall-smoke-brew:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Brew install/uninstall smoke
        run: |
          set -euo pipefail
          brew tap-new cafaye/local
          TAP_DIR="$(brew --repository)/Library/Taps/cafaye/homebrew-local"
          curl -fsSL https://raw.githubusercontent.com/cafaye/homebrew-cafaye-cli/master/Formula/cafaye.rb \
            -o "${TAP_DIR}/Formula/cafaye.rb"
          brew install cafaye/local/cafaye
          cafaye --help >/dev/null
          brew uninstall cafaye/local/cafaye
          brew untap cafaye/local

  install-uninstall-smoke-direct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Direct install/uninstall smoke
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cafaye-linux-amd64 .
          INSTALL_DIR="$RUNNER_TEMP/bin" LOCAL_BINARY_PATH="dist/cafaye-linux-amd64" bash ./scripts/install.sh
          "$RUNNER_TEMP/bin/cafaye" --help >/dev/null
          INSTALL_DIR="$RUNNER_TEMP/bin" bash ./scripts/uninstall.sh
          test ! -e "$RUNNER_TEMP/bin/cafaye"

  build-and-package:
    needs: [install-uninstall-smoke-brew, install-uninstall-smoke-direct]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/cafaye-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/cafaye-darwin-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/cafaye-darwin-amd64 .
          (cd dist && sha256sum cafaye-* > SHA256SUMS)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cafaye-cli-dist
          path: |
            dist/cafaye-linux-amd64
            dist/cafaye-darwin-arm64
            dist/cafaye-darwin-amd64
            dist/SHA256SUMS
