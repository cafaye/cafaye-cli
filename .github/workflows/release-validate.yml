name: Release Validate

on:
  release:
    types: [published]

jobs:
  validate-install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux amd64 asset from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ASSET=$(gh release view "$TAG" --json assets --jq '.assets[].name' | grep -E 'linux.*amd64|amd64.*linux' | head -n1)
          if [[ -z "${ASSET}" ]]; then
            echo "No linux/amd64 asset found for ${TAG}"
            gh release view "$TAG" --json assets --jq '.assets[].name'
            exit 1
          fi
          echo "asset=${ASSET}"
          gh release download "$TAG" --pattern "$ASSET" --dir dist
          gh release download "$TAG" --pattern "SHA256SUMS" --dir dist

      - name: Validate binary runs
        run: |
          set -euo pipefail
          FILE=$(ls dist | head -n1)
          if [[ "$FILE" == *.tar.gz ]]; then
            tar -xzf "dist/$FILE" -C dist
          fi
          if [[ "$FILE" == *.zip ]]; then
            unzip -o "dist/$FILE" -d dist
          fi
          BIN=$(find dist -type f -name 'cafaye*' | head -n1)
          if [[ -z "${BIN}" ]]; then
            echo "No cafaye binary found in release artifact"
            find dist -maxdepth 3 -type f -print
            exit 1
          fi
          if [[ ! -f dist/SHA256SUMS ]]; then
            echo "SHA256SUMS is missing from release artifacts"
            find dist -maxdepth 3 -type f -print
            exit 1
          fi
          BASENAME=$(basename "$BIN")
          EXPECTED=$(awk -v file="$BASENAME" '$2 == file { print $1 }' dist/SHA256SUMS)
          if [[ -z "${EXPECTED}" ]]; then
            echo "No checksum found for ${BASENAME}"
            cat dist/SHA256SUMS
            exit 1
          fi
          ACTUAL=$(sha256sum "$BIN" | awk '{print $1}')
          if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
            echo "Checksum mismatch for ${BASENAME}"
            echo "expected=${EXPECTED}"
            echo "actual=${ACTUAL}"
            exit 1
          fi
          chmod +x "$BIN"
          "$BIN" --help | sed -n '1,80p'
